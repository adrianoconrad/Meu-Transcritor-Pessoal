name: Compilação Automática do APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Obter Código do Repositório
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Gerar Gradle Wrapper
      run: gradle wrapper

    - name: Dar Permissão de Execução para o Gradle Wrapper
      run: chmod +x gradlew

    - name: Compilar APK (Debug)
      run: ./gradlew assembleDebug

    - name: Enviar APK Gerado como Artefato
      uses: actions/upload-artifact@v4
      with:
        name: Lapidador-de-Voz-APK
        path: app/build/outputs/apk/debug/app-debug.apk
